<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- básico -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- metas móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <!-- metas del sitio -->
    <title>Celulares</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <!-- css bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- estilo css -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- fevicon -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <link
      rel="stylesheet"
      href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css"
    />
  </head>
  <!-- body -->
  <body class="main-layout">
    <!-- NAVBAR INICIO -->
    <div id="navbar-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;
          });
      });
    </script>
    <!-- NAVBAR FIN -->
    <!-- Sección principal inicio -->

    <!-- Sección principal fin -->
    <!-- Secccion Catalogo Productos inicio -->
    <div class="catalog-container row">
      <aside class="col-lg-2 col-sm-12 pr-0 pl-3 category-left">
        <header>
          <nav class="nav-category">
            <ul>
              <li class="category-menu p-active">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Todas las marcas</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Samsung</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Vivo</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Apple</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Xiaomi</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">ZTE</button>
              </li>
              <li class="category-menu">
                <img src="./images/mobileIcon.svg" style="height: 20px" />
                <button class="category-btn">Motorola</button>
              </li>
            </ul>
          </nav>
        </header>
      </aside>
      <main class="col-lg-10 col-sm-12 my-2 p-3 bg-white product-catalog">
        <h2 id="text-selected-catalog">Todas las marcas</h2>
        <div class="row">
          <div class="col-lg-3 col-sm-4 product-item text-center">
            <img class="product-img" src="images/redmi13pro.jpg" alt="" />
            <div class="product-detail px-5 mb-5">
              <h3 class="product-title">Samsung Galaxy S21 pro</h3>
              <p class="product-price">$1000000</p>
              <button class="product-add px-2">Agregar</button>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- Secccion Catalogo Productos fin -->
    <!-- sección de pie de página inicio -->
    <div id="footer-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        $("#footer-placeholder").load("./components/footer.html");
      });
    </script>
    <!-- sección de pie de página fin -->

    <!-- Archivos Javascript-->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.0.0.min.js"></script>
  </body>
</html>
