<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- básico -->
    <meta charset="utf-8" />

    <!-- css bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- estilo css -->
    <link rel="stylesheet" href="css/style.css" />

    <link rel="stylesheet" href="css/responsive.css" />

    <link

  <!-- body -->
  <body class="main-layout">
    <!-- NAVBAR INICIO -->
    <div id="navbar-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;
          });
      });
    </script>
    <!-- NAVBAR FIN -->
    <!-- Sección principal inicio -->

    <!-- Sección principal fin -->
    <!-- Secccion Catalogo Productos inicio -->
    <div class="catalog-container row">
      <aside class="col-lg-2 col-sm-12 pr-0 pl-3 category-left mb-5">
        <header>
          <nav class="nav-category">
            <ul>
              <li class="category-menu p-active">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Todas las categorías</button>
              </li>
              <li class="category-menu">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Protección</button>
              </li>
              <li class="category-menu">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Cargadores</button>
              </li>
              <li class="category-menu">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Sonido</button>

              <li class="category-menu">

              </li>
              <li class="category-menu">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Carro</button>
              </li>
              <li class="category-menu">
                <button class="category-btn"><img src="./images/mobileIcon.svg"/>Otros</button>
              </li>
            </ul>
          </nav>
        </header>
      </aside>
      <main class="col-lg-10 col-sm-12 my-2 p-1 bg-white product-catalog">
        <h2 id="text-selected-catalog">Todas las categorías</h2>
        <div class="row productPlaceholder">
        </div>
        <script src="./components/productCatalog.js"></script>
      </main>
    </div>
    <!-- Secccion Catalogo Productos fin -->
    <!-- sección de pie de página inicio -->
    <div id="footer-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        $("#footer-placeholder").load("./components/footer.html");

    <!-- sección de pie de página fin -->

    <!-- Archivos Javascript-->
    <script src="js/jquery.min.js"></script>
