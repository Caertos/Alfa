<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
        <title>Carrito de Compras - TechStore</title>
        <link rel="stylesheet" href="css/bootstrap.min.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/responsive.css" />
        <link rel="icon" href="images/fevicon.png" type="image/gif" />
        <link rel="stylesheet" href="css/jquery.mCustomScrollbar.min.css" />
        <link
            rel="stylesheet"
            href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css"
        />
        <link rel="stylesheet" href="css/owl.carousel.min.css" />
        <link rel="stylesheet" href="css/owl.theme.default.min.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css"
            media="screen"
        />
    </head>
    <body class="main-layout">
        <!--Encabezado inicio-->
        <div class="header_section">
        <div id="header-placeholder"></div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                $("#header-placeholder").load("./components/navbar.html");
            });
        </script>
        </div>
        <!--Encabezado fin-->

        <!-- Carrito de Compras inicio -->
        <div class="layout_padding cart_section">
            <div class="container">
                <h1 class="new_text"><strong>Carrito de Compras</strong></h1>
                <div class="cart_items">
                    <div class="row">
                        <div class="col-md-8">
                            <div class="cart_item">
                                <div class="row">
                                    <div class="col-md-4">
                                        <img src="images/fundas.jpeg" class="cart_img" />
                                    </div>
                                    <div class="col-md-8">
                                        <h4>Funda para Celular</h4>
                                        <p>Cantidad: 1</p>
                                        <p>Precio: $20</p>
                                        <button class="remove_bt">Eliminar</button>
                                    </div>
                                </div>
                            </div>
                            <div class="cart_item">
                                <div class="row">
                                    <div class="col-md-4">
                                        <img src="images/accesorios.jpeg" class="cart_img" />
                                    </div>
                                    <div class="col-md-8">
                                        <h4>Accesorio</h4>
                                        <p>Cantidad: 2</p>
                                        <p>Precio: $30</p>
                                        <button class="remove_bt">Eliminar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="cart_total">
                                <h4>Total</h4>
                                <p>Subtotal: $50</p>
                                <p>Envío: $5</p>
                                <p><strong>Total: $55</strong></p>
                                <button class="buy_now_bt">Comprar Ahora</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Carrito de Compras fin -->

        <!-- sección de pie de página inicio -->
        <div id="footer-placeholder"></div>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                $("#footer-placeholder").load("./components/footer.html");
            });
        </script>
        <!-- sección de pie de página fin -->

        <!-- Archivos Javascript-->
        <script src="js/jquery.min.js"></script>
        <script src="js/popper.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/jquery-3.0.0.min.js"></script>
        <script src="js/plugin.js"></script>
        <script src="js/jquery.mCustomScrollbar.concat.min.js"></script>
        <script src="js/custom.js"></script>
        <script src="js/owl.carousel.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
    </body>
</html>
