<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- básico -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- metas móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <!-- metas del sitio -->
    <title>TechStore</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <!-- css bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- estilo css -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- fevicon -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <link
      rel="stylesheet"
      href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css"
    />
  </head>
  <!-- cuerpo -->

  <body>
    <!--Encabezado inicio-->

    <div id="navbar-placeholder"></div>
    <div id="banner-placeholder" style="background-color: black"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;
          });

        fetch("./components/bannersection.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("banner-placeholder").innerHTML = data;
          });
      });
    </script>

    <!--Encabezado fin-->

    <!-- nueva colección sección inicio -->
    <div class="img-fluid">
      <img src="images/publicity.jpg" alt="" />
    </div>
    <!-- nueva colección sección fin -->

    <!-- sección de productos inicio -->
    <div class="pt-5 gallery_section">
      <h1 class="ml-3 text-white"><strong>Nuevos Productos</strong></h1>
      <!-- Contenedor para los productos -->
      <div id="product-container">
        <div class="px-2 row productData"></div>
      </div>
      <!-- Contenedor para la paginación -->
      <div id="pagination" class="container text-center"></div>
    </div>

    <div class="container">
      <h1 class="new_text"><strong>SECCION PARA MOSTRAS LAS TIENDAS O CUALQUIER COSA</strong></h1>
      </div>
    <script src="./components/productsection.js"></script>
    <!-- sección de productos fin -->

    <!-- sección de pie de página inicio -->
    <div id="footer-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        $("#footer-placeholder").load("./components/footer.html");
      });
    </script>
    <!-- sección de pie de página fin -->

    <!-- Archivos Javascript-->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.0.0.min.js"></script>
  </body>
</html>
