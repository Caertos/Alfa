<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- básico -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- metas móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <!-- metas del sitio -->
    <title>TechStore</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <!-- css bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- estilo css -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- fevicon -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <!-- Scrollbar Custom CSS -->
    <link rel="stylesheet" href="css/jquery.mCustomScrollbar.min.css" />
    <!-- Ajustes para IEs más antiguos-->
    <link
      rel="stylesheet"
      href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css"
    />
    <!-- owl stylesheets -->
    <link rel="stylesheet" href="css/owl.carousel.min.css" />
    <link rel="stylesheet" href="css/owl.theme.default.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css"
      media="screen"
    />
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script
    ><![endif]-->
  </head>
  <!-- cuerpo -->
  <body>
    <!--Encabezado inicio-->

    <div id="navbar-placeholder"></div>
    <div id="banner-placeholder" style="background-color: black"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;
          });
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/bannersection.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("banner-placeholder").innerHTML = data;
          });
      });
    </script>

    <!--Encabezado fin-->

    <!-- nueva colección sección inicio -->
    <div class="img-fluid">
      <img src="images/publicity.jpg" alt="" />
    </div>
    <!-- nueva colección sección fin -->

    <!-- sección de productos inicio -->
    <div class="pt-5 gallery_section">
      <!-- Contenedor para los productos -->
      <div id="product-container"></div>
      <!-- Contenedor para la paginación -->
      <div id="pagination" class="container text-center py-0 pb-3"></div>
    </div>

    <div class="container" id="filter-panel">
      <h1 class="new_text"><strong>Categorías</strong></h1>
      <div class="filters">
        <select id="categoryFilter" class="form-control mb-2">
          <option value="all">Todas las Categorías</option>
          <option value="celulares">Celulares</option>
          <option value="accesorios">Accesorios</option>
          <option value="cargadores">Cargadores</option>
        </select>
        <!-- Dropdown de marcas: se muestra solo si se selecciona "celulares" -->
        <select
          id="brandFilter"
          class="form-control mb-2"
          style="display: none"
        >
          <!-- Se poblará dinámicamente -->
        </select>
        <select id="priceSort" class="form-control">
          <option value="asc">Precio: Menor a Mayor</option>
          <option value="desc">Precio: Mayor a Menor</option>
        </select>
      </div>
    </div>
        <script src="./components/productsection.js"></script>
    <!-- sección de productos fin -->

    <!-- sección de pie de página inicio -->
    <div id="footer-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        $("#footer-placeholder").load("./components/footer.html");
      });
    </script>
    <!-- sección de pie de página fin -->

    <!-- Archivos Javascript-->
    <script src="js/jquery.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.0.0.min.js"></script>
<!--     <script src="js/plugin.js"></script> -->
    <!-- barra lateral -->
    <script src="js/jquery.mCustomScrollbar.concat.min.js"></script>
    <script src="js/custom.js"></script>
    <!-- javascript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.js"></script>
  </body>
</html>
