<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- básico -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- metas móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1" />
    <!-- metas del sitio -->
    <title>TechStore</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <!-- css bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- estilo css -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Responsive-->
    <link rel="stylesheet" href="css/responsive.css" />
    <!-- fevicon -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <link
      rel="stylesheet"
      href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css"
    />
  </head>
  <!-- cuerpo -->

  <body>
    <!--Encabezado inicio-->

    <div id="navbar-placeholder"></div>
    <div id="banner-placeholder" style="background-color: black"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("./components/navbar.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("navbar-placeholder").innerHTML = data;
          });

        fetch("./components/bannersection.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("banner-placeholder").innerHTML = data;
          });
      });
    </script>

    <!--Encabezado fin-->

    <!-- nueva colección sección inicio -->
    <div class="img-fluid">
      <img src="images/publicity.jpg" alt="" />
    </div>
    <!-- nueva colección sección fin -->

    <!-- sección de productos inicio -->
    <div class="pt-5 gallery_section">
      <!-- Contenedor para los productos -->
      <div id="product-container">
        <div class="px-2 row productData"></div>
      </div>
      <!-- Template de productos -->
      <template id="product-template">
        <div class="tarjeta col-lg-2 col-md-4 col-sm-12 my-2">
          <div class="containerProduct noselect">
            <div class="canvas">
              <div class="tracker tr-1"></div>
              <div class="tracker tr-2"></div>
              <div class="tracker tr-3"></div>
              <div class="tracker tr-4"></div>
              <div class="tracker tr-5"></div>
              <div class="tracker tr-6"></div>
              <div class="tracker tr-7"></div>
              <div class="tracker tr-8"></div>
              <div class="tracker tr-9"></div>
              <div id="card">
                <div class="card-content">
                  <div class="card-glare"></div>
                  <div class="cyber-lines">
                    <span></span><span></span><span></span><span></span>
                  </div>
                    <p id="prompt"></p>
                  <div class="title d-flex justify-content-center">
                    <img
                      src=""
                      alt=""
                      class="phoneImg"
                    />
                  </div>
                  <div class="glowing-elements">
                    <div class="glow-1"></div>
                    <div class="glow-2"></div>
                    <div class="glow-3"></div>
                  </div>
                  <div class="subtitle">
                    <span>$</span><span class="highlight priceProduct"></span>
                  </div>
                  <div class="card-particles">
                    <span></span><span></span><span></span> <span></span
                    ><span></span><span></span>
                  </div>
                  <div class="corner-elements">
                    <span></span><span></span><span></span><span></span>
                  </div>
                  <div class="scan-line"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
      <!-- Template de productos -->
      <!-- Contenedor para la paginación -->
      <!-- <div id="pagination" class="container text-center"></div> -->
    </div>

    <div class="container" id="filter-panel">
      <h1 class="new_text"><strong>Categorías</strong></h1>
      <div class="filters">
        <select id="categoryFilter" class="form-control mb-3">
          <option value="all">Todas las Categorías</option>
          <option value="celulares">Celulares</option>
          <option value="accesorios">Accesorios</option>
          <option value="cargadores">Cargadores</option>
        </select>
        <!-- Dropdown de marcas: se muestra solo si se selecciona "celulares" -->
        <select
          id="brandFilter"
          class="form-control mb-2"
          style="display: none"
        >
          <!-- Se poblará dinámicamente -->
        </select>
        <select id="priceSort" class="form-control">
          <option value="asc">Precio: Menor a Mayor</option>
          <option value="desc">Precio: Mayor a Menor</option>
        </select>
      </div>
    </div>
    <script src="./components/productsection.js"></script>
    <!-- sección de productos fin -->

    <!-- sección de pie de página inicio -->
    <div id="footer-placeholder"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        $("#footer-placeholder").load("./components/footer.html");
      });
    </script>
    <!-- sección de pie de página fin -->

    <!-- Archivos Javascript-->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.0.0.min.js"></script>
  </body>
</html>
